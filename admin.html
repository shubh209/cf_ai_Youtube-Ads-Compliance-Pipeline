<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Brand Guardian Admin</title>
  <style>
    body { font-family: system-ui, sans-serif; background: #0e1017; color: #e8ecf7; margin: 0; padding: 2rem; }
    h1 { margin-top: 0; }
    a { color: #00e5b0; }
    table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
    th, td { border: 1px solid #2a3050; padding: .5rem; text-align: left; font-size: .85rem; }
    th { background: #1e2235; }
    button { background: #4f6aff; color: white; border: none; padding: .5rem 1rem; border-radius: 6px; cursor: pointer; }
    button.secondary { background: #2a3050; }
    .panel { background: #141824; border: 1px solid #2a3050; border-radius: 8px; padding: 1rem; margin-bottom: 1.5rem; }
    input, select, textarea { width: 100%; padding: .5rem; margin: .25rem 0 .75rem; background: #0e1017; border: 1px solid #2a3050; color: #e8ecf7; border-radius: 4px; }
    .msg { font-size: .85rem; color: #00e5b0; }
    .err { color: #ff4060; }
  </style>
</head>
<body>
  <h1>Brand Guardian Admin</h1>
  <p><a href="/">← Back to audit UI</a></p>

  <div class="panel">
    <h2>Authentication</h2>
    <label>Bearer token (Entra access token for API scope)</label>
    <input id="tokenInput" placeholder="Paste token or use AUTH_DISABLED locally" />
    <button onclick="saveToken()">Save Token</button>
    <button class="secondary" onclick="loadMe()">Test /auth/me</button>
    <div id="meResult" class="msg"></div>
  </div>

  <div class="panel">
    <h2>Audit History (team scoped)</h2>
    <button onclick="loadAudits()">Refresh Audits</button>
    <table>
      <thead><tr><th>Created</th><th>URL</th><th>AI</th><th>Final</th><th>Source</th><th>Actions</th></tr></thead>
      <tbody id="auditTable"></tbody>
    </table>
  </div>

  <div class="panel">
    <h2>Human Review</h2>
    <label>Audit ID</label>
    <input id="reviewAuditId" />
    <label>Decision (PASS or FAIL)</label>
    <select id="reviewDecision"><option>PASS</option><option>FAIL</option></select>
    <label>Notes</label>
    <textarea id="reviewNotes" rows="3"></textarea>
    <button onclick="submitReview()">Submit Review</button>
    <div id="reviewResult" class="msg"></div>
  </div>

  <div class="panel">
    <h2>Policy Versions</h2>
    <button onclick="loadPolicies()">Refresh</button>
    <button onclick="reindexPolicies()">Reindex PDFs</button>
    <ul id="policyList"></ul>
  </div>

  <div class="panel">
    <h2>Team API Keys (admin only)</h2>
    <label>Key name</label>
    <input id="apiKeyName" placeholder="ci-integration" />
    <button onclick="createApiKey()">Create API Key</button>
    <pre id="apiKeyResult"></pre>
    <ul id="apiKeyList"></ul>
  </div>

<script>
const API_BASE = window.location.origin;

function headers() {
  const token = localStorage.getItem('access_token') || document.getElementById('tokenInput').value.trim();
  const h = { 'Content-Type': 'application/json' };
  if (token) h['Authorization'] = `Bearer ${token}`;
  return h;
}

function saveToken() {
  localStorage.setItem('access_token', document.getElementById('tokenInput').value.trim());
  document.getElementById('meResult').textContent = 'Token saved.';
}

async function loadMe() {
  const el = document.getElementById('meResult');
  try {
    const res = await fetch(`${API_BASE}/auth/me`, { headers: headers() });
    const data = await res.json();
    if (!res.ok) throw new Error(data.detail || res.statusText);
    el.textContent = `Logged in as ${data.email || data.user_id} (${data.role}) team=${data.team_id}`;
    el.className = 'msg';
  } catch (e) {
    el.textContent = e.message;
    el.className = 'err';
  }
}

async function loadAudits() {
  const tbody = document.getElementById('auditTable');
  tbody.innerHTML = '';
  const res = await fetch(`${API_BASE}/audits`, { headers: headers() });
  const data = await res.json();
  if (!res.ok) { tbody.innerHTML = `<tr><td colspan="6">${data.detail}</td></tr>`; return; }
  data.forEach(a => {
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td>${new Date(a.created_at).toLocaleString()}</td>
      <td>${a.video_url}</td>
      <td>${a.ai_status}</td>
      <td>${a.final_status}</td>
      <td>${a.ingestion_source || 'n/a'}</td>
      <td>
        <button class="secondary" onclick="document.getElementById('reviewAuditId').value='${a.id}'">Review</button>
        <a href="${API_BASE}/audits/${a.id}/export?format=csv" target="_blank">CSV</a>
      </td>`;
    tbody.appendChild(tr);
  });
}

async function submitReview() {
  const id = document.getElementById('reviewAuditId').value.trim();
  const el = document.getElementById('reviewResult');
  const res = await fetch(`${API_BASE}/audits/${id}/review`, {
    method: 'POST',
    headers: headers(),
    body: JSON.stringify({
      decision: document.getElementById('reviewDecision').value,
      notes: document.getElementById('reviewNotes').value,
    }),
  });
  const data = await res.json();
  if (!res.ok) { el.textContent = data.detail; el.className = 'err'; return; }
  el.textContent = `Review saved. Final status: ${data.final_status}`;
  el.className = 'msg';
  loadAudits();
}

async function loadPolicies() {
  const ul = document.getElementById('policyList');
  ul.innerHTML = '';
  const res = await fetch(`${API_BASE}/admin/policies/versions`, { headers: headers() });
  const data = await res.json();
  if (!res.ok) { ul.innerHTML = `<li>${data.detail}</li>`; return; }
  data.forEach(p => {
    const li = document.createElement('li');
    li.textContent = `${p.version_label} — ${p.chunk_count} chunks ${p.is_current ? '(current)' : ''}`;
    ul.appendChild(li);
  });
}

async function reindexPolicies() {
  const res = await fetch(`${API_BASE}/admin/policies/reindex`, { method: 'POST', headers: headers() });
  const data = await res.json();
  alert(res.ok ? `Reindexed: ${data.version_label} (${data.chunk_count} chunks)` : data.detail);
  loadPolicies();
}

async function createApiKey() {
  const res = await fetch(`${API_BASE}/admin/api-keys`, {
    method: 'POST',
    headers: headers(),
    body: JSON.stringify({ name: document.getElementById('apiKeyName').value }),
  });
  const data = await res.json();
  document.getElementById('apiKeyResult').textContent = res.ok
    ? `Save this key now (shown once): ${data.api_key}`
    : data.detail;
  loadApiKeys();
}

async function loadApiKeys() {
  const ul = document.getElementById('apiKeyList');
  ul.innerHTML = '';
  const res = await fetch(`${API_BASE}/admin/api-keys`, { headers: headers() });
  const data = await res.json();
  if (!res.ok) return;
  data.forEach(k => {
    const li = document.createElement('li');
    li.textContent = `${k.name} (${k.key_prefix}…) active=${k.is_active}`;
    ul.appendChild(li);
  });
}

document.getElementById('tokenInput').value = localStorage.getItem('access_token') || '';
</script>
</body>
</html>
