name: Build and Deploy to Azure Container Apps

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          pip install uv
          uv pip install --system .
      - name: Run tests
        env:
          AUTH_DISABLED: "true"
          PYTHONPATH: .
        run: pytest tests/ -v

  build-and-deploy:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Build and Deploy to Container Apps
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}
          acrName: ${{ secrets.REGISTRY_NAME }}
          acrUsername: ${{ secrets.BRANDGUARDIANAPI_REGISTRY_USERNAME }}
          acrPassword: ${{ secrets.BRANDGUARDIANAPI_REGISTRY_PASSWORD }}
          containerAppName: brand-guardian-api
          resourceGroup: LLM-yt
          dockerfilePath: Dockerfile
          targetPort: 8000